<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Text Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="container" style="max-width: 900px;">
    <div class="card shadow-sm">
        <div class="card-body p-4 text-center">
            <h1 class="h3 mb-4">Enter your text</h1>

            <textarea id="user_text" class="form-control mb-3" rows="5" placeholder="Type text here..."></textarea>

            <button id="submitBtn" class="btn btn-primary px-5 mb-4">Analyze</button>

            <div id="result" class="row g-2 px-2">
                </div>
        </div>
    </div>
</div>

<script>
document.getElementById("submitBtn").addEventListener("click", () => {
    const text = document.getElementById("user_text").value.trim();
    const resultDiv = document.getElementById("result");

    if (!text) {
        resultDiv.innerHTML = `
            <div class="col-12">
                <div class="alert alert-warning mb-0">Please enter some text to analyze.</div>
            </div>`;
        return;
    }

    fetch("http://127.0.0.1:5000/" + "analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: text })
    })
    .then(res => res.json())
    .then(data => {
        resultDiv.innerHTML = `
            <div class="col-3">
                <div class="small text-secondary mb-1">Chars (with spaces)</div>
                <div class="bg-primary text-white fw-bold py-2 rounded-1">${data.char_count_with_spaces}</div>
            </div>
            <div class="col-3">
                <div class="small text-secondary mb-1">Chars (no spaces)</div>
                <div class="bg-primary text-white fw-bold py-2 rounded-1">${data.char_count_without_spaces}</div>
            </div>
            <div class="col-3">
                <div class="small text-secondary mb-1">Words count</div>
                <div class="bg-primary text-white fw-bold py-2 rounded-1">${data.word_count}</div>
            </div>
            <div class="col-3">
                <div class="small text-secondary mb-1">Sentences</div>
                <div class="bg-primary text-white fw-bold py-2 rounded-1">${data.sentence_count}</div>
            </div>

            <div class="col-12 mt-4">
                <div class="small text-secondary mb-1 text-start">Top 5 words</div>
                <div class="list-group shadow-sm">
                    ${data.top_words.map(item => `
                        <div class="list-group-item d-flex justify-content-between align-items-center py-2">
                            <span class="fw-medium">${item.word}</span>
                            <span class="badge bg-primary">${item.count}</span>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    })
    .catch(err => {
        resultDiv.innerHTML = `<div class="alert alert-danger w-100">Error: ${err.message}</div>`;
    });
});
</script>
</body>
</html>
